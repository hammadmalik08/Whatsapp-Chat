<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
        }
        .div1{
            width: 100%;
            height: 100vh;
            background-color: rgb(249, 250, 250);
        }
        .div2{
            width: 30%;
            height: 700px;
            background-color: rgb(233, 233, 233);
            margin-left: 30%;
            margin-top: 10%;
        }
        .box2{
            text-align: center;
            font-size: 60px;
            margin-top: 70px;
        }
        .para1{
            text-align: center;
            font-size: 40px;
            margin-top: 20px;
        }
        .input1{
            font-weight: bold;
            font-size: 30px;
            width: 80%;
            height: 7%;
            margin-left: 10%;
            margin-top: 7%;
        }
        .submit1{
            width: 80%;
            height: 7%;
            margin-top: 8%;
            font-weight: bold;
            color: white;
            background-color: rgb(9, 224, 9);
            margin-left: 10%;
            font-size: 25px;
        }
        .submit1:active{
             background-color: blue;

        }
    </style>
</head>
<body>
    <div class="div1">..

        <div class="div2">..

            <h1 class="box2">
                Subscribe to Our Newsletter
            </h1>

            <P class="para1">
                Stay updated with Newsletter
            </P>

            <input type="email" placeholder="Enter Your Email" required class="input1">

            <input type="submit" class="submit1 ">

        </div>

    </div>


</body>
</html>
